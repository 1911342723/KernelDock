# KernelDock 出站白名单代理配置
# 默认拒绝一切，仅放行 filter 文件（whitelist.txt）中匹配的域名。

Port 8888
Listen 0.0.0.0
Timeout 60
MaxClients 64

# 仅允许来自容器网段的请求
Allow 172.16.0.0/12
Allow 10.0.0.0/8
Allow 192.168.0.0/16

# 白名单过滤：默认拒绝，filter 文件按域名正则放行
Filter "/etc/tinyproxy/filter"
FilterURLs Off
FilterDefaultDeny Yes

# 禁用 CONNECT 以外端口（仅 443）
ConnectPort 443

LogLevel Notice
