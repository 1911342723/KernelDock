services:
  kerneldock:
    build:
      context: .
      dockerfile: Dockerfile
    image: kerneldock:latest
    container_name: kerneldock
    # Gateway needs Docker socket access to manage sandbox containers.
    # Production recommendation: use rootless Docker or a Docker socket
    # proxy (e.g. tecnativa/docker-socket-proxy) to limit API surface.
    # Security isolation is enforced by sandbox containers themselves
    # (non-root + read-only rootfs + network=none + optional gVisor).
    user: root
    ports:
      - "9527:8080"
    volumes:
      # 持久化 workspace 数据
      - executor_workspace:/workspace
      # 允许管理 docker 以启动沙箱子容器
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - WORKSPACE_DIR=/workspace
      # ---- 沙箱镜像（Dockerfile.sandbox 构建的镜像） ----
      - SANDBOX_DOCKER_IMAGE=${SANDBOX_DOCKER_IMAGE:-kerneldock-sandbox:v2.0.0}
      
      # ============ 资源限制配置（针对4C8G服务器优化） ============
      # 每个沙箱的资源限制
      - SANDBOX_RESOURCE__DEFAULT_CPU=1.0              # 每个沙箱最多占 1核
      - SANDBOX_RESOURCE__DEFAULT_MEMORY_MB=512        # 每个沙箱 512MB（256太小，kernel启动就OOM）
      - SANDBOX_RESOURCE__DEFAULT_DISK_MB=1024         # 每个沙箱 1GB 磁盘
      - SANDBOX_RESOURCE__MAX_CPU=2.0                  # 最大允许 2核
      - SANDBOX_RESOURCE__MAX_MEMORY_MB=2048           # 最大允许 2GB
      
      # ============ 并发控制配置 ============
      # Semaphore limit should match pool_size so every warm container can
      # serve a request concurrently (each kernel_server is single-threaded).
      - SANDBOX_QUEUE__MAX_CONCURRENT_EXECUTIONS=4     # = pool_size
      - SANDBOX_QUEUE__INITIAL_AVG_EXECUTION_TIME=5.0
      - SANDBOX_QUEUE__QUEUE_TIMEOUT=300
      
      # ============ 容器池配置 ============
      - SANDBOX_POOL__POOL_SIZE=4                      # 预热容器数量（4 * 512MB = 2GB）
      - SANDBOX_POOL__MAX_CONCURRENT_SANDBOXES=10      # 最大并发沙箱数
      - SANDBOX_POOL__CONTAINER_MAX_AGE_SECONDS=3600   # 容器最大存活 1小时
      - SANDBOX_POOL__HEALTH_CHECK_INTERVAL=60         # 健康检查间隔 1分钟
      
      # ============ 超时配置 ============
      # 优化超时设置，提高资源利用率
      - SANDBOX_TIMEOUT__EXECUTION_TIMEOUT=300         # 代码执行超时 5分钟
      - SANDBOX_TIMEOUT__SESSION_IDLE_TIMEOUT=600      # 会话空闲超时 10分钟（降低以提高并发）
      - SANDBOX_TIMEOUT__SESSION_MAX_TIMEOUT=43200     # 会话最大时长 12小时
      - SANDBOX_TIMEOUT__SANDBOX_STARTUP_TIMEOUT=30    # 沙箱启动超时 30秒
      
      # ============ Fire-and-Forget 配置（无状态短链接模式） ============
      - SANDBOX_FIRE_AND_FORGET__DEFAULT_TIMEOUT=30    # 默认执行超时 30秒
      - SANDBOX_FIRE_AND_FORGET__MAX_DATA_SIZE_MB=50   # 数据文件最大 50MB
      - SANDBOX_FIRE_AND_FORGET__CLEANUP_TIMEOUT=10    # 清理超时 10秒
      
      # ============ 安全配置 ============
      # CORS: 生产环境应设置为实际前端域名，逗号分隔
      # 例如: CORS_ALLOWED_ORIGINS=https://app.example.com,https://admin.example.com
      # 留空则使用 "*"（仅开发环境）
      - CORS_ALLOWED_ORIGINS=
      - SANDBOX_ALLOW_LOCAL_FALLBACK=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:     # 这是“硬上限” (网关进程最多能用多少)
          cpus: '1'       # 网关最多吃掉 1 核 CPU
          memory: 1G      # 网关最多使用 1GB 内存
        reservations:    # 这是“软保证” (Docker保证给网关留出多少)
          cpus: '0.2'
          memory: 256M

volumes:
  executor_workspace:
    driver: local
